name: "Setup .Net and Workloads"
description: "Sets up .NET SDK 10 and installs the specified workloads"
inputs:
  workloads:
    description: 'The workloads array to install'
    required: false 
    default: ""
runs:
  using: "composite"
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5.0.1
      with:
        dotnet-version: '10.0.201'
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/*.props
          global.json

    - name: Install Workloads
      if: ${{ inputs.workloads != '' }}
      shell: pwsh
      run: |
        $rollback = "${{ github.workspace }}/.github/workloads/rollback.json"
        $workloads = "${{ inputs.workloads }}".Split(' ')
        foreach ($workload in $workloads) {
          dotnet workload install $workload --from-rollback-file $rollback
        }